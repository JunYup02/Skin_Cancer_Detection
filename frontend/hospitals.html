<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dermalyze — Nearby dermatologists</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-frame">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" data-nav-back="dashboard.html" aria-label="Go back">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <span class="topbar-title">Nearby dermatologists</span>
      </div>
      <button class="avatar-btn" data-account-btn aria-label="Account">
        <span class="material-symbols-outlined">account_circle</span>
      </button>
    </header>

    <main class="screen">
      <div id="location-banner" class="banner banner-error hidden">
        <span class="material-symbols-outlined">location_off</span>
        <span></span>
      </div>

      <div style="display:flex; gap:8px; overflow-x:auto; padding-bottom:2px;">
        <button type="button" class="radius-chip" data-radius="1500" style="white-space:nowrap; padding:8px 16px; border-radius:999px; border:1px solid var(--outline-variant); background:var(--surface-container-lowest); font-size:13px; font-weight:600; color:var(--on-surface-variant); cursor:pointer;">1.5 km</button>
        <button type="button" class="radius-chip active" data-radius="3000" style="white-space:nowrap; padding:8px 16px; border-radius:999px; border:1px solid var(--primary); background:var(--primary); color:var(--on-primary); font-size:13px; font-weight:600; cursor:pointer;">3 km</button>
        <button type="button" class="radius-chip" data-radius="7000" style="white-space:nowrap; padding:8px 16px; border-radius:999px; border:1px solid var(--outline-variant); background:var(--surface-container-lowest); font-size:13px; font-weight:600; color:var(--on-surface-variant); cursor:pointer;">7 km</button>
        <button type="button" class="radius-chip" data-radius="10000" style="white-space:nowrap; padding:8px 16px; border-radius:999px; border:1px solid var(--outline-variant); background:var(--surface-container-lowest); font-size:13px; font-weight:600; color:var(--on-surface-variant); cursor:pointer;">10 km</button>
      </div>

      <div id="clinics-state" class="state-panel">
        <div class="spinner" style="border-color: color-mix(in srgb, var(--outline) 30%, transparent); border-top-color: var(--outline);"></div>
        <p>Getting your location…</p>
      </div>

      <div id="clinics-list" style="display:flex; flex-direction:column; gap:12px;"></div>
    </main>

    <nav class="bottom-nav">
      <a class="nav-item" href="dashboard.html">
        <span class="material-symbols-outlined">dashboard</span>
        <span class="label">Dashboard</span>
      </a>
      <a class="nav-item active" href="hospitals.html">
        <span class="material-symbols-outlined">medical_services</span>
        <span class="label">Clinics</span>
      </a>
      <a class="nav-item" href="support.html">
        <span class="material-symbols-outlined">help_center</span>
        <span class="label">Support</span>
      </a>
    </nav>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/hospitals.js"></script>
</body>
</html>
