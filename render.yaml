services:
  - type: web
    name: skin-cancer-detector-demo
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PREDICTOR_BACKEND
        value: local
      - key: VERTEX_PROJECT_ID
        sync: false
      - key: VERTEX_LOCATION
        sync: false
      - key: VERTEX_ENDPOINT_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
